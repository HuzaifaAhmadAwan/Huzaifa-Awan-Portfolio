<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Bebas Neue', 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0c0c0e 0%, #111115 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0f0f5;
    }

    .game-container {
      background: #18181f;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 20px;
      padding: 48px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      font-size: 48px;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: #7070a0;
      margin-bottom: 48px;
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .score-board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 48px;
      padding-bottom: 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .score {
      text-align: center;
    }

    .score-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7070a0;
      margin-bottom: 8px;
    }

    .score-number {
      font-size: 36px;
      font-weight: 700;
      color: #e8ff47;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .choice-btn {
      padding: 24px;
      border: 2px solid rgba(255, 255, 255, 0.14);
      background: transparent;
      color: #f0f0f5;
      border-radius: 12px;
      cursor: pointer;
      font-size: 32px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .choice-btn:hover {
      border-color: #e8ff47;
      background: rgba(232, 255, 71, 0.05);
      transform: translateY(-4px);
    }

    .choice-btn.active {
      border-color: #e8ff47;
      background: rgba(232, 255, 71, 0.1);
      box-shadow: 0 0 20px rgba(232, 255, 71, 0.2);
    }

    .choice-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7070a0;
    }

    .result {
      text-align: center;
      margin-bottom: 32px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .result-text {
      font-size: 24px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .result-detail {
      font-size: 14px;
      color: #7070a0;
    }

    .result.win .result-text {
      color: #10b981;
    }

    .result.lose .result-text {
      color: #ef4444;
    }

    .result.draw .result-text {
      color: #e8ff47;
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px 28px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: transparent;
      color: #f0f0f5;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .play-btn {
      border-color: #e8ff47;
      color: #e8ff47;
    }

    .play-btn:hover {
      background: #e8ff47;
      color: #000;
    }

    .play-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .reset-btn {
      border-color: rgba(255, 255, 255, 0.14);
    }

    .reset-btn:hover {
      border-color: #7070a0;
      color: #7070a0;
    }

    .emoji {
      font-size: 48px;
      margin-bottom: 8px;
    }

    @media (max-width: 480px) {
      .game-container {
        padding: 32px 24px;
      }

      h1 {
        font-size: 36px;
      }

      .choices {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .choice-btn {
        padding: 16px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>ROCK PAPER SCISSORS</h1>
    <div class="subtitle">Test your skills</div>

    <div class="score-board">
      <div class="score">
        <div class="score-label">Your Score</div>
        <div class="score-number" id="playerScore">0</div>
      </div>
      <div class="score">
        <div class="score-label">Computer Score</div>
        <div class="score-number" id="computerScore">0</div>
      </div>
    </div>

    <div class="choices">
      <button class="choice-btn" data-choice="rock" title="Rock">
        <div class="emoji">👊</div>
        <div class="choice-label">Rock</div>
      </button>
      <button class="choice-btn" data-choice="paper" title="Paper">
        <div class="emoji">✋</div>
        <div class="choice-label">Paper</div>
      </button>
      <button class="choice-btn" data-choice="scissors" title="Scissors">
        <div class="emoji">✌️</div>
        <div class="choice-label">Scissors</div>
      </button>
    </div>

    <div class="result" id="result"></div>

    <div class="button-group">
      <button class="reset-btn" id="resetBtn">RESET</button>
    </div>
  </div>

  <script>
    const choices = document.querySelectorAll('.choice-btn');
    const resetBtn = document.getElementById('resetBtn');
    const resultDiv = document.getElementById('result');
    const playerScoreEl = document.getElementById('playerScore');
    const computerScoreEl = document.getElementById('computerScore');

    let playerChoice = null;
    let playerScore = 0;
    let computerScore = 0;

    choices.forEach(btn => {
      btn.addEventListener('click', () => {
        // Remove active class from all buttons
        choices.forEach(b => b.classList.remove('active'));
        // Add active class to clicked button
        btn.classList.add('active');
        playerChoice = btn.dataset.choice;
        // Automatically play when a choice is made
        setTimeout(play, 300);
      });
    });
    resetBtn.addEventListener('click', reset);

    function getComputerChoice() {
      const options = ['rock', 'paper', 'scissors'];
      return options[Math.floor(Math.random() * 3)];
    }

    function determineWinner(player, computer) {
      if (player === computer) return 'draw';
      if (
        (player === 'rock' && computer === 'scissors') ||
        (player === 'paper' && computer === 'rock') ||
        (player === 'scissors' && computer === 'paper')
      ) {
        return 'win';
      }
      return 'lose';
    }

    function getEmoji(choice) {
      const emojis = {
        rock: '👊',
        paper: '✋',
        scissors: '✌️'
      };
      return emojis[choice];
    }

    function play() {
      const computerChoice = getComputerChoice();
      const result = determineWinner(playerChoice, computerChoice);

      let resultText = '';
      let details = '';

      if (result === 'win') {
        playerScore++;
        resultText = 'YOU WIN! 🎉';
        details = `${getEmoji(playerChoice)} beats ${getEmoji(computerChoice)}`;
      } else if (result === 'lose') {
        computerScore++;
        resultText = 'YOU LOSE! 😢';
        details = `${getEmoji(computerChoice)} beats ${getEmoji(playerChoice)}`;
      } else {
        resultText = "IT'S A TIE! 🤝";
        details = `You both chose ${playerChoice}`;
      }

      resultDiv.className = `result ${result}`;
      resultDiv.innerHTML = `
        <div class="result-text">${resultText}</div>
        <div class="result-detail">${details}</div>
      `;

      playerScoreEl.textContent = playerScore;
      computerScoreEl.textContent = computerScore;

      choices.forEach(b => b.classList.remove('active'));
      playerChoice = null;
    }

    function reset() {
      playerScore = 0;
      computerScore = 0;
      playerChoice = null;
      playerScoreEl.textContent = '0';
      computerScoreEl.textContent = '0';
      resultDiv.innerHTML = '';
      resultDiv.className = 'result';
      playBtn.disabled = true;
      choices.forEach(b => b.classList.remove('active'));
    }
  </script>
</body>
</html>
