<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Aquarium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a2a4b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .aquarium-container {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(to bottom, #1a4d6d, #0d2a3a);
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 150, 255, 0.3);
            overflow: hidden;
            border: 3px solid #00d4ff;
        }



        canvas {
            display: block;
            background: linear-gradient(180deg, 
                rgba(26, 77, 109, 0.8) 0%,
                rgba(13, 42, 58, 0.9) 100%);
            width: 100%;
            height: auto;
            cursor: url('assets/images/indexFinger.png'), pointer;
        }

        .popup-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            animation: popupFade 3s ease-out forwards;
            pointer-events: none;
        }

        .popup-message img {
            max-width: 90vw;
            height: auto;
            display: block;
        }

        @keyframes popupFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
        }

        .exit-button {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #FF6B6B, #FF1493);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 50;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
        }

        .exit-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .thank-you-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            animation: thankYouFade 2s ease-out forwards;
            pointer-events: none;
        }

        .thank-you-message img {
            max-width: 90vw;
            height: auto;
            display: block;
        }

        @keyframes thankYouFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.8);
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="aquarium-container">
        <button class="exit-button" id="exitButton">Exit Aquarium</button>
        <canvas id="aquariumCanvas"></canvas>
    </div>
    <div class="popup-message" id="popupMessage">
        <img src="assets/images/pressSpaceToFeed.png" alt="Press Space to Feed">
    </div>
    <div class="thank-you-message" id="thankYouMessage" style="display: none;">
        <img src="assets/images/thanksForSwimmingBy.png" alt="Thanks for Swimming By">
    </div>

    <script>
        // ============================================================================
        // AQUARIUM CANVAS SETUP
        // ============================================================================

        const canvas = document.getElementById('aquariumCanvas');
        const ctx = canvas.getContext('2d');

        // Aquarium boundaries (constrain to tank area within the background image)
        let aquariumBounds = {
            left: 0,
            right: 0,
            top: 0,
            bottom: 0
        };

        function updateAquariumBounds() {
            aquariumBounds = {
                left: canvas.width * 0.06,
                right: canvas.width * 0.945,
                top: canvas.height * 0.22,
                bottom: canvas.height * 0.82
            };
        }

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = Math.max(500, window.innerHeight * 0.7);
            updateAquariumBounds();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Load background video
        const backgroundVideo = document.createElement('video');
        backgroundVideo.src = 'assets/images/aquariumBackground.mp4';
        backgroundVideo.loop = true;
        backgroundVideo.muted = true;
        backgroundVideo.autoplay = true;
        let backgroundLoaded = false;
        backgroundVideo.oncanplay = () => {
            backgroundLoaded = true;
            backgroundVideo.play();
        };

        // ============================================================================
        // FISH TYPES & PROPERTIES
        // ============================================================================

        // ============================================================================
        // GAME OBJECTS
        // ============================================================================

        class Food {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vy = 1 + Math.random() * 1;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.nutrition = 30;
                this.size = 4;
                this.eaten = false;
                this.touchedFloor = false;
                this.floorTimer = 0;
                // Random colorful food
                const colors = ['#FF6B6B', '#FFD700', '#FF1493', '#00FF7F', '#00BFFF', '#FFB347', '#FF69B4', '#32CD32'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.y += this.vy;
                this.x += this.vx;

                // Keep food within aquarium bounds with margin
                if (this.x < aquariumBounds.left + 5) this.x = aquariumBounds.left + 5;
                if (this.x > aquariumBounds.right - 5) this.x = aquariumBounds.right - 5;

                // Stop at bottom of aquarium
                if (this.y > aquariumBounds.bottom - 10) {
                    this.y = aquariumBounds.bottom - 10;
                    this.vy = 0;
                    if (!this.touchedFloor) {
                        this.touchedFloor = true;
                        this.floorTimer = 180; // 3 seconds at 60 FPS
                    }
                }

                // Count down timer after touching floor
                if (this.touchedFloor) {
                    this.floorTimer--;
                }
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Glow
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size + 3, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        class Bubble {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vy = -0.5 - Math.random() * 0.5;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.radius = 2 + Math.random() * 4;
                this.life = 200;
            }

            update() {
                this.y += this.vy;
                this.x += this.vx;
                this.life--;
            }

            draw(ctx) {
                ctx.strokeStyle = `rgba(0, 200, 255, ${this.life / 200})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        class Plant {
            constructor(x, baseY) {
                this.x = x;
                this.baseY = baseY;
                this.height = 40 + Math.random() * 60;
                this.waveOffset = Math.random() * Math.PI * 2;
                this.waveSpeed = 0.02 + Math.random() * 0.02;
            }

            draw(ctx) {
                ctx.strokeStyle = '#2ECC71';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.baseY);

                for (let i = 0; i < this.height; i += 5) {
                    const wave = Math.sin(this.waveOffset + i * 0.1) * 5;
                    ctx.lineTo(this.x + wave, this.baseY - i);
                }
                ctx.stroke();

                this.waveOffset += this.waveSpeed;
            }
        }

        class Shell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.bubbleTimer = 0;
            }

            update() {
                this.bubbleTimer++;
            }

            draw(ctx) {
                ctx.fillStyle = '#D4A574';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, 15, 20, 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#C19A6B';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Create bubbles
                if (this.bubbleTimer % 30 === 0) {
                    bubbles.push(new Bubble(this.x, this.y - 10));
                }
            }
        }

        class Jellyfish1 {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = 40;
                this.waveOffset = Math.random() * Math.PI * 2;
                this.image = new Image();
                this.image.src = 'assets/images/jellyfish1.png';
                this.imageLoaded = false;
                this.image.onload = () => {
                    this.imageLoaded = true;
                };
            }

            update(mouseX, mouseY) {
                // Check distance to mouse
                const mouseDistX = mouseX - this.x;
                const mouseDistY = mouseY - this.y;
                const mouseDist = Math.hypot(mouseDistX, mouseDistY);

                if (mouseDist < 150) {
                    // Flee from mouse
                    this.vx = -mouseDistX / mouseDist * 1.2;
                    this.vy = -mouseDistY / mouseDist * 1.2;
                } else {
                    // Gentle wandering behavior
                    if (Math.random() < 0.03) {
                        this.vx = (Math.random() - 0.5) * 1.5;
                        this.vy = (Math.random() - 0.5) * 0.8;
                    }
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;
                this.waveOffset += 0.03;

                // Account for jellyfish size when bouncing
                const jellyfishExtent = this.size / 2;
                
                // Bounce off left and right aquarium walls
                if (this.x - jellyfishExtent < aquariumBounds.left) {
                    this.x = aquariumBounds.left + jellyfishExtent;
                    this.vx = Math.abs(this.vx);
                }
                if (this.x + jellyfishExtent > aquariumBounds.right) {
                    this.x = aquariumBounds.right - jellyfishExtent;
                    this.vx = -Math.abs(this.vx);
                }
                if (this.y - jellyfishExtent < aquariumBounds.top) this.y = aquariumBounds.top + jellyfishExtent;
                if (this.y + jellyfishExtent > aquariumBounds.bottom) this.y = aquariumBounds.bottom - jellyfishExtent;
            }

            draw(ctx) {
                if (this.imageLoaded) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    // Add bobbing motion
                    const bob = Math.sin(this.waveOffset) * 5;
                    
                    ctx.drawImage(this.image, -this.size / 2, -this.size / 2 + bob, this.size, this.size);
                    ctx.restore();
                }
            }
        }

        class Crab {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = 0;
                this.size = 65;
                this.groundY = aquariumBounds.bottom - 25;
                this.image = new Image();
                this.image.src = 'assets/images/crab.png';
                this.imageLoaded = false;
                this.image.onload = () => {
                    this.imageLoaded = true;
                };
                this.direction = this.vx > 0 ? 1 : -1;
            }

            update(mouseX, mouseY) {
                // Keep crab on the ground
                this.y = this.groundY;

                // Check distance to mouse
                const mouseDistX = mouseX - this.x;
                const mouseDistY = mouseY - this.y;
                const mouseDist = Math.hypot(mouseDistX, mouseDistY);

                if (mouseDist < 150) {
                    // Flee from mouse (move along ground)
                    this.vx = -mouseDistX / mouseDist * 1.5;
                } else {
                    // Gentle side-to-side wandering behavior
                    if (Math.random() < 0.02) {
                        this.vx = (Math.random() - 0.5) * 1;
                    }
                }

                // Update direction based on velocity
                if (this.vx > 0.1) {
                    this.direction = 1;
                } else if (this.vx < -0.1) {
                    this.direction = -1;
                }

                // Update position
                this.x += this.vx;

                // Bounce off left and right aquarium walls
                const crabExtent = this.size / 2;
                if (this.x - crabExtent < aquariumBounds.left) {
                    this.x = aquariumBounds.left + crabExtent;
                    this.vx = Math.abs(this.vx);
                    this.direction = 1;
                }
                if (this.x + crabExtent > aquariumBounds.right) {
                    this.x = aquariumBounds.right - crabExtent;
                    this.vx = -Math.abs(this.vx);
                    this.direction = -1;
                }
            }

            draw(ctx) {
                if (this.imageLoaded) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    // Flip crab based on direction
                    if (this.direction === -1) {
                        ctx.scale(-1, 1);
                    }
                    
                    ctx.drawImage(this.image, -this.size / 2, -this.size / 2, this.size, this.size);
                    ctx.restore();
                }
            }
        }

        class Clownfish {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 1;
                this.size = 50;
                this.image = new Image();
                this.image.src = 'assets/images/clownfish.png';
                this.imageLoaded = false;
                this.image.onload = () => {
                    this.imageLoaded = true;
                };
                this.direction = this.vx > 0 ? 1 : -1;
                this.verticalTilt = 0;
                this.targetFood = null;
                this.awareness = 200;
            }

            findNearestFood(foods) {
                let nearest = null;
                let minDist = this.awareness;

                for (let food of foods) {
                    const dist = Math.hypot(food.x - this.x, food.y - this.y);
                    if (dist < minDist) {
                        nearest = food;
                        minDist = dist;
                    }
                }
                return nearest;
            }

            update(mouseX, mouseY, foods) {
                // Check distance to mouse
                const mouseDistX = mouseX - this.x;
                const mouseDistY = mouseY - this.y;
                const mouseDist = Math.hypot(mouseDistX, mouseDistY);

                if (mouseDist < 150) {
                    // Flee from mouse
                    this.vx = -mouseDistX / mouseDist * 2;
                    this.vy = -mouseDistY / mouseDist * 1.5;
                } else {
                    // Look for food
                    this.targetFood = this.findNearestFood(foods);

                    if (this.targetFood) {
                        const dx = this.targetFood.x - this.x;
                        const dy = this.targetFood.y - this.y;
                        const dist = Math.hypot(dx, dy);

                        // Move towards food
                        this.vx = (dx / dist) * 2;
                        this.vy = (dy / dist) * 1.5;

                        // Check if eating
                        if (dist < 20) {
                            this.targetFood.eaten = true;
                            this.targetFood = null;
                        }
                    } else {
                        // Gentle wandering behavior
                        if (Math.random() < 0.02) {
                            this.vx = (Math.random() - 0.5) * 2;
                            this.vy = (Math.random() - 0.5) * 1;
                        }
                    }
                }

                // Update direction based on velocity
                if (this.vx > 0.1) {
                    this.direction = 1;
                } else if (this.vx < -0.1) {
                    this.direction = -1;
                }

                // Update vertical tilt for up/down movement
                if (Math.abs(this.vx) > 0.1) {
                    this.verticalTilt = Math.atan(this.vy / Math.abs(this.vx)) * 0.5;
                } else if (Math.abs(this.vy) > 0.1) {
                    this.verticalTilt = Math.atan(this.vy / 0.1) * 0.5;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Account for clownfish size
                const clownfishExtent = this.size / 2;
                
                // Bounce off left and right aquarium walls
                if (this.x - clownfishExtent < aquariumBounds.left) {
                    this.x = aquariumBounds.left + clownfishExtent;
                    this.vx = Math.abs(this.vx);
                }
                if (this.x + clownfishExtent > aquariumBounds.right) {
                    this.x = aquariumBounds.right - clownfishExtent;
                    this.vx = -Math.abs(this.vx);
                }
                if (this.y - clownfishExtent < aquariumBounds.top) this.y = aquariumBounds.top + clownfishExtent;
                if (this.y + clownfishExtent > aquariumBounds.bottom) this.y = aquariumBounds.bottom - clownfishExtent;
            }

            draw(ctx) {
                if (this.imageLoaded) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    // Flip based on direction
                    if (this.direction === -1) {
                        ctx.scale(-1, 1);
                    }
                    
                    // Apply vertical tilt for up/down movement
                    ctx.rotate(this.verticalTilt);
                    
                    ctx.drawImage(this.image, -this.size / 2, -this.size / 2, this.size, this.size);
                    ctx.restore();
                }
            }
        }

                let minDist = this.awareness;

                for (let food of foods) {
                    const dist = Math.hypot(food.x - this.x, food.y - this.y);
                    if (dist < minDist) {
                        nearest = food;
                        minDist = dist;
                    }
                }
                return nearest;
            }

            update(mouseX, mouseY, foods) {
                // Check distance to mouse
                const mouseDistX = mouseX - this.x;
                const mouseDistY = mouseY - this.y;
                const mouseDist = Math.hypot(mouseDistX, mouseDistY);

                if (mouseDist < 150) {
                    // Flee from mouse
                    this.vx = -mouseDistX / mouseDist * 2;
                    this.vy = -mouseDistY / mouseDist * 1.5;
                } else {
                    // Look for food
                    this.targetFood = this.findNearestFood(foods);

                    if (this.targetFood) {
                        const dx = this.targetFood.x - this.x;
                        const dy = this.targetFood.y - this.y;
                        const dist = Math.hypot(dx, dy);

                        // Move towards food
                        this.vx = (dx / dist) * 2;
                        this.vy = (dy / dist) * 1.5;

                        // Check if eating
                        if (dist < 20) {
                            this.targetFood.eaten = true;
                            this.targetFood = null;
                        }
                    } else {
                        // Gentle wandering behavior
                        if (Math.random() < 0.02) {
                            this.vx = (Math.random() - 0.5) * 2;
                            this.vy = (Math.random() - 0.5) * 1;
                        }
                    }
                }

                // Update direction based on velocity
                if (this.vx > 0.1) {
                    this.direction = 1;
                } else if (this.vx < -0.1) {
                    this.direction = -1;
                }

                // Update vertical tilt for up/down movement
                if (Math.abs(this.vx) > 0.1) {
                    this.verticalTilt = Math.atan(this.vy / Math.abs(this.vx)) * 0.5;
                } else if (Math.abs(this.vy) > 0.1) {
                    this.verticalTilt = Math.atan(this.vy / 0.1) * 0.5;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Account for angelfish size
                const angelfishExtent = this.size / 2;
                
                // Bounce off left and right aquarium walls
                if (this.x - angelfishExtent < aquariumBounds.left) {
                    this.x = aquariumBounds.left + angelfishExtent;
                    this.vx = Math.abs(this.vx);
                }
                if (this.x + angelfishExtent > aquariumBounds.right) {
                    this.x = aquariumBounds.right - angelfishExtent;
                    this.vx = -Math.abs(this.vx);
                }
                if (this.y - angelfishExtent < aquariumBounds.top) this.y = aquariumBounds.top + angelfishExtent;
                if (this.y + angelfishExtent > aquariumBounds.bottom) this.y = aquariumBounds.bottom - angelfishExtent;
            }

            draw(ctx) {
                if (this.imageLoaded) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    // Flip based on direction
                    if (this.direction === -1) {
                        ctx.scale(-1, 1);
                    }
                    
                    // Apply vertical tilt for up/down movement
                    ctx.rotate(this.verticalTilt);
                    
                    ctx.drawImage(this.image, -this.size / 2, -this.size / 2, this.size, this.size);
                    ctx.restore();
                }
            }

        // ============================================================================
        // GAME LOOP
        // ============================================================================

        function update() {
            // Update food
            for (let i = foods.length - 1; i >= 0; i--) {
                foods[i].update();
                if (foods[i].eaten || (foods[i].touchedFloor && foods[i].floorTimer <= 0)) {
                    foods.splice(i, 1);
                }
            }

            // Update bubbles
            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                if (bubbles[i].life <= 0) {
                    bubbles.splice(i, 1);
                }
            }

            // Create random bubbles from bottom

        function draw() {

                ctx.drawImage(backgroundVideo, 0, 0, canvas.width, canvas.height);

                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, 'rgba(26, 77, 109, 0.6)');
                gradient.addColorStop(1, 'rgba(13, 42, 58, 0.8)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
