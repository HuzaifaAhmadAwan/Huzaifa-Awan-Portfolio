<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Aquarium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: url('assets/images/aquarium/indexFinger.png') 10 0, pointer;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html {
            cursor: url('assets/images/aquarium/indexFinger.png') 10 0, pointer;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a2a4b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            cursor: url('assets/images/aquarium/indexFinger.png') 10 0, pointer;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            html, body {
                width: 100vw;
                height: 100vh;
                padding: 0;
                margin: 0;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            
            body {
                padding: 0;
                min-height: 100vh;
                align-items: stretch;
                justify-content: stretch;
                flex: 1;
                width: 100vw;
                height: 100vh;
            }
        }

        .aquarium-container {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(to bottom, #1a4d6d, #0d2a3a);
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 150, 255, 0.3);
            overflow: hidden;
            border: 3px solid #00d4ff;
            position: relative;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .aquarium-container {
                width: 100vw;
                height: 100vh;
                max-width: 100vw;
                max-height: 100vh;
                border-radius: 0;
                border: none;
                box-shadow: none;
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 0;
                left: 0;
                margin: 0;
                padding: 0;
                flex-shrink: 0;
            }
        }



        canvas {
            display: block;
            background: linear-gradient(180deg, 
                rgba(26, 77, 109, 0.8) 0%,
                rgba(13, 42, 58, 0.9) 100%);
            cursor: url('assets/images/aquarium/indexFinger.png') 10 0, pointer;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        @media (max-width: 768px) {
            canvas {
                width: 100vw !important;
                height: 100vh !important;
                display: block;
                max-width: 100vw;
                max-height: 100vh;
                margin: 0;
                padding: 0;
            }
        }

        .popup-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            animation: popupFade 3s ease-out forwards;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .popup-message:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .popup-message img {
            max-width: 90vw;
            height: auto;
            display: block;
        }

        @keyframes popupFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.2);
            }
            80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.6);
            }
        }

        .exit-button {
            position: absolute;
            top: -35px;
            left: 0px;
            padding: 0;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 50;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .exit-button {
                top: 8px;
                right: 8px;
                left: auto;
                position: fixed;
                z-index: 100;
            }

            .exit-button img {
                height: 50px;
                width: auto;
            }
        }

        .exit-button img {
            height: 150px;
            width: auto;
            display: block;
        }

        .exit-button:hover {
            transform: scale(1.1);
        }

        .thank-you-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            animation: thankYouFade 2s ease-out forwards;
            pointer-events: none;
        }

        .thank-you-message img {
            max-width: 90vw;
            height: auto;
            display: block;
        }

        @keyframes thankYouFade {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.2);
            }
            80% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.6);
            }
        }

        .feed-button {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            transition: all 0.3s ease;
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .feed-button:active {
            transform: translateX(-50%) scale(0.95);
        }

        .feed-button.holding {
            background: linear-gradient(135deg, #00ff88 0%, #00dd66 100%);
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.6);
        }

        @media (max-width: 768px) {
            .feed-button {
                display: block;
                position: fixed;
                bottom: 10px;
                right: 10px;
                left: auto;
                padding: 10px 18px;
                font-size: 12px;
                transform: none;
                z-index: 100;
            }

            .feed-button:active {
                transform: scale(0.95);
            }
        }

        @media (max-width: 768px) and (max-height: 500px) {
            /* Landscape mode on mobile */
            .feed-button {
                bottom: 10px;
                right: 10px;
                padding: 10px 16px;
                font-size: 12px;
            }
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a2a4b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #00d4ff;
            font-size: 18px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 300;
            letter-spacing: 1px;
        }
    </style>

</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Aquarium...</div>
    </div>
    
    <div class="aquarium-container">
        <button class="exit-button" id="exitButton">
            <img src="assets/images/aquarium/exitButton.png" alt="Exit Aquarium">
        </button>
        <canvas id="aquariumCanvas"></canvas>
    </div>
    <div class="popup-message" id="popupMessage">
        <img src="assets/images/aquarium/pressSpaceToFeed.png" alt="Press Space to Feed">
    </div>
    <button class="feed-button" id="feedButton">Feed Fish</button>
    <div class="thank-you-message" id="thankYouMessage" style="display: none;">
        <img src="assets/images/aquarium/thanksForSwimmingBy.png" alt="Thanks for Swimming By">
    </div>

    <script>
        // ============================================================================
        // LANDSCAPE ORIENTATION LOCK FOR MOBILE
        // ============================================================================
        
        let gameInitialized = false;
        let gameLoopRunning = false;

        // Force landscape orientation on mobile devices
        if (screen.orientation && typeof screen.orientation.lock === 'function') {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                screen.orientation.lock('landscape').catch(err => {
                    // Silently fail if orientation lock is not supported
                    console.log('Orientation lock not supported on this device');
                });
            }
        }

        // Show warning for portrait mode on mobile
        function checkOrientation() {
            const isMobile = window.innerWidth < 768;
            const existingWarning = document.getElementById('orientationWarning');
            
            if (isMobile && window.innerHeight > window.innerWidth) {
                // Device is in portrait - only create warning if it doesn't exist
                if (!existingWarning) {
                    const warningMsg = document.createElement('div');
                    warningMsg.id = 'orientationWarning';
                    warningMsg.style.cssText = `
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background: rgba(0, 0, 0, 0.95);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        z-index: 1000;
                        color: white;
                        text-align: center;
                        font-size: 28px;
                        font-weight: bold;
                        font-family: Arial, sans-serif;
                    `;
                    warningMsg.textContent = '📱\n\nPlease rotate your device to landscape';
                    document.body.appendChild(warningMsg);
                }
            } else {
                // In landscape - remove warning and ensure game is initialized
                if (existingWarning) {
                    existingWarning.remove();
                }
                // Initialize game if not already started - with small delay for dimensions to update
                if (!gameInitialized && !gameLoopRunning) {
                    setTimeout(() => {
                        resizeCanvas();
                        startGame();
                    }, 50);
                }
            }
        }

        // Check orientation on load and on orientation change
        checkOrientation();
        window.addEventListener('orientationchange', () => {
            // Delay check to allow screen dimensions to update
            setTimeout(checkOrientation, 100);
        });
        window.addEventListener('resize', () => {
            resizeCanvas();
            checkOrientation();
        });

        // ============================================================================
        // AQUARIUM CANVAS SETUP
        // ============================================================================

        const canvas = document.getElementById('aquariumCanvas');
        const ctx = canvas.getContext('2d');

        // Aquarium boundaries (constrain to tank area within the background image)
        let aquariumBounds = {
            left: 0,
            right: 0,
            top: 0,
            bottom: 0
        };

        function updateAquariumBounds() {
            aquariumBounds = {
                left: canvas.width * 0.06,
                right: canvas.width * 0.945,
                top: canvas.height * 0.22,
                bottom: canvas.height * 0.82
            };
        }

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            const isMobile = window.innerWidth < 768;
            
            if (isMobile) {
                // Mobile landscape mode - fill entire viewport
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                // Don't set container styles - let CSS handle it
            } else {
                // Desktop - maintain aspect ratio
                canvas.width = container.clientWidth || window.innerWidth;
                canvas.height = Math.max(500, window.innerHeight * 0.7);
            }
            updateAquariumBounds();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Preload all images for faster loading
        const imagesToPreload = [
            'assets/images/aquarium/indexFinger.png',
            'assets/images/aquarium/exitButton.png',
            'assets/images/aquarium/pressSpaceToFeed.png',
            'assets/images/aquarium/thanksForSwimmingBy.png',
            'assets/images/aquarium/jellyfish1.png',
            'assets/images/aquarium/jellyfish2.png',
            'assets/images/aquarium/clownfish.png',
            'assets/images/aquarium/bettafish.png',
            'assets/images/aquarium/angelfish.png',
            'assets/images/aquarium/angelfish2.png',
            'assets/images/aquarium/corydoras.png',
            'assets/images/aquarium/discus.png',
            'assets/images/aquarium/fancyGoldfish.png',
            'assets/images/aquarium/goldfish.png',
            'assets/images/aquarium/guppyfish.png',
            'assets/images/aquarium/koifish.png',
            'assets/images/aquarium/neontetra.png',
            'assets/images/aquarium/zebradanio.png',
            'assets/images/aquarium/pufferfish.png'
        ];
        imagesToPreload.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        // Load background video
        const backgroundVideo = document.createElement('video');
        backgroundVideo.src = 'assets/images/aquarium/aquariumBackground.mp4';
        backgroundVideo.loop = true;
        backgroundVideo.muted = true;
        backgroundVideo.preload = 'auto';
        let backgroundLoaded = false;
        
        // Load video in background without blocking game start
        backgroundVideo.addEventListener('canplay', () => {
            backgroundLoaded = true;
            backgroundVideo.play().catch(() => {
                // Silently fail if autoplay is blocked
            });
        }, { once: true });
        
        // Start loading background asynchronously
        setTimeout(() => {
            backgroundVideo.load();
        }, 500);

        // ============================================================================
        // FISH TYPES & PROPERTIES
        // ============================================================================

        // ============================================================================
        // GAME OBJECTS
        // ============================================================================

        class Food {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vy = 1 + Math.random() * 1;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.nutrition = 30;
                this.size = 4;
                this.eaten = false;
                this.touchedFloor = false;
                this.floorTimer = 0;
                // Random colorful food
                const colors = ['#FF6B6B', '#FFD700', '#FF1493', '#00FF7F', '#00BFFF', '#FFB347', '#FF69B4', '#32CD32'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.y += this.vy;
                this.x += this.vx;

                // Keep food within aquarium bounds with margin
                if (this.x < aquariumBounds.left + 5) this.x = aquariumBounds.left + 5;
                if (this.x > aquariumBounds.right - 5) this.x = aquariumBounds.right - 5;

                // Stop at bottom of aquarium
                if (this.y > aquariumBounds.bottom - 10) {
                    this.y = aquariumBounds.bottom - 10;
                    this.vy = 0;
                    if (!this.touchedFloor) {
                        this.touchedFloor = true;
                        this.floorTimer = 180; // 3 seconds at 60 FPS
                    }
                }

                // Count down timer after touching floor
                if (this.touchedFloor) {
                    this.floorTimer--;
                }
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Glow
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size + 3, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        class Bubble {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vy = -0.5 - Math.random() * 0.5;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.radius = 2 + Math.random() * 4;
                this.life = 200;
            }

            update() {
                this.y += this.vy;
                this.x += this.vx;
                this.life--;
            }

            draw(ctx) {
                ctx.strokeStyle = `rgba(0, 200, 255, ${this.life / 200})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        class Plant {
            constructor(x, baseY) {
                this.x = x;
                this.baseY = baseY;
                this.height = 40 + Math.random() * 60;
                this.waveOffset = Math.random() * Math.PI * 2;
                this.waveSpeed = 0.02 + Math.random() * 0.02;
            }

            draw(ctx) {
                ctx.strokeStyle = '#2ECC71';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x, this.baseY);

                for (let i = 0; i < this.height; i += 5) {
                    const wave = Math.sin(this.waveOffset + i * 0.1) * 5;
                    ctx.lineTo(this.x + wave, this.baseY - i);
                }
                ctx.stroke();

                this.waveOffset += this.waveSpeed;
            }
        }

        class Shell {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.bubbleTimer = 0;
            }

            update() {
                this.bubbleTimer++;
            }

            draw(ctx) {
                ctx.fillStyle = '#D4A574';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, 15, 20, 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#C19A6B';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Create bubbles
                if (this.bubbleTimer % 30 === 0) {
                    bubbles.push(new Bubble(this.x, this.y - 10));
                }
            }
        }

        class Jellyfish1 {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = 40;
                this.waveOffset = Math.random() * Math.PI * 2;
                this.image = new Image();
                this.image.src = 'assets/images/aquarium/jellyfish1.png';
                this.imageLoaded = false;
                this.image.onload = () => {
                    this.imageLoaded = true;
                };
            }

            update(mouseX, mouseY) {
                // Check distance to mouse
                const mouseDistX = mouseX - this.x;
                const mouseDistY = mouseY - this.y;
                const mouseDist = Math.hypot(mouseDistX, mouseDistY);

                if (mouseDist < 150) {
                    // Flee from mouse
                    this.vx = -mouseDistX / mouseDist * 1.2;
                    this.vy = -mouseDistY / mouseDist * 1.2;
                } else {
                    // Gentle wandering behavior
                    if (Math.random() < 0.03) {
                        this.vx = (Math.random() - 0.5) * 1.5;
                        this.vy = (Math.random() - 0.5) * 0.8;
                    }
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;
                this.waveOffset += 0.03;

                // Account for jellyfish size when bouncing
                const jellyfishExtent = this.size / 2;
                
                // Bounce off left and right aquarium walls
                if (this.x - jellyfishExtent < aquariumBounds.left) {
                    this.x = aquariumBounds.left + jellyfishExtent;
                    this.vx = Math.abs(this.vx);
                }
                if (this.x + jellyfishExtent > aquariumBounds.right) {
                    this.x = aquariumBounds.right - jellyfishExtent;
                    this.vx = -Math.abs(this.vx);
                }
                if (this.y - jellyfishExtent < aquariumBounds.top) this.y = aquariumBounds.top + jellyfishExtent;
                if (this.y + jellyfishExtent > aquariumBounds.bottom) this.y = aquariumBounds.bottom - jellyfishExtent;
            }

            draw(ctx) {
                if (this.imageLoaded) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    // Add bobbing motion
                    const bob = Math.sin(this.waveOffset) * 5;
                    
                    ctx.drawImage(this.image, -this.size / 2, -this.size / 2 + bob, this.size, this.size);
                    ctx.restore();
                }
            }
        }

        class Jellyfish2 {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = 40;
                this.waveOffset = Math.random() * Math.PI * 2;
                this.image = new Image();
                this.image.src = 'assets/images/aquarium/jellyfish2.png';
                this.imageLoaded = false;
                this.image.onload = () => {
                    this.imageLoaded = true;
                };
            }

            update(mouseX, mouseY) {
                // Check distance to mouse
                const mouseDistX = mouseX - this.x;
                const mouseDistY = mouseY - this.y;
                const mouseDist = Math.hypot(mouseDistX, mouseDistY);

                if (mouseDist < 150) {
                    // Flee from mouse
                    this.vx = -mouseDistX / mouseDist * 1.2;
                    this.vy = -mouseDistY / mouseDist * 1.2;
                } else {
                    // Gentle wandering behavior
                    if (Math.random() < 0.03) {
                        this.vx = (Math.random() - 0.5) * 1.5;
                        this.vy = (Math.random() - 0.5) * 0.8;
                    }
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;
                this.waveOffset += 0.03;

                // Account for jellyfish size when bouncing
                const jellyfishExtent = this.size / 2;
                
                // Bounce off left and right aquarium walls
                if (this.x - jellyfishExtent < aquariumBounds.left) {
                    this.x = aquariumBounds.left + jellyfishExtent;
                    this.vx = Math.abs(this.vx);
                }
                if (this.x + jellyfishExtent > aquariumBounds.right) {
                    this.x = aquariumBounds.right - jellyfishExtent;
                    this.vx = -Math.abs(this.vx);
                }
                if (this.y - jellyfishExtent < aquariumBounds.top) this.y = aquariumBounds.top + jellyfishExtent;
                if (this.y + jellyfishExtent > aquariumBounds.bottom) this.y = aquariumBounds.bottom - jellyfishExtent;
            }

            draw(ctx) {
                if (this.imageLoaded) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    // Add bobbing motion
                    const bob = Math.sin(this.waveOffset) * 5;
                    
                    ctx.drawImage(this.image, -this.size / 2, -this.size / 2 + bob, this.size, this.size);
                    ctx.restore();
                }
            }
        }

        class Crab {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = 0;
                this.size = 65;
                this.groundY = aquariumBounds.bottom - 25;
                this.image = new Image();
                this.image.src = 'assets/images/aquarium/crab.png';
                this.imageLoaded = false;
                this.image.onload = () => {
                    this.imageLoaded = true;
                };
                this.direction = this.vx > 0 ? 1 : -1;
            }

            update(mouseX, mouseY) {
                // Keep crab on the ground
                this.y = this.groundY;

                // Check distance to mouse
                const mouseDistX = mouseX - this.x;
                const mouseDistY = mouseY - this.y;
                const mouseDist = Math.hypot(mouseDistX, mouseDistY);

                if (mouseDist < 150) {
                    // Flee from mouse (move along ground)
                    this.vx = -mouseDistX / mouseDist * 1.5;
                } else {
                    // Gentle side-to-side wandering behavior
                    if (Math.random() < 0.02) {
                        this.vx = (Math.random() - 0.5) * 1;
                    }
                }

                // Update direction based on velocity
                if (this.vx > 0.1) {
                    this.direction = 1;
                } else if (this.vx < -0.1) {
                    this.direction = -1;
                }

                // Update position
                this.x += this.vx;

                // Bounce off left and right aquarium walls
                const crabExtent = this.size / 2;
                if (this.x - crabExtent < aquariumBounds.left) {
                    this.x = aquariumBounds.left + crabExtent;
                    this.vx = Math.abs(this.vx);
                    this.direction = 1;
                }
                if (this.x + crabExtent > aquariumBounds.right) {
                    this.x = aquariumBounds.right - crabExtent;
                    this.vx = -Math.abs(this.vx);
                    this.direction = -1;
                }
            }

            draw(ctx) {
                if (this.imageLoaded) {

            }
        }

        // ============================================================================
        // GAME STATE
        // ============================================================================

        let foods = [];
        let bubbles = [];
        let plants = [];
        let shells = [];
        let jellyfish = [];
        let crabs = [];
        let clownfish = [];
        let bettafish = [];
        let angelfish = [];
        let angelfish2 = [];
        let bettafish2 = [];
        let corydoras = [];
        let discus = [];
        let fancyGoldfish = [];
        let goldfish = [];
        let guppyfish = [];
        let koifish = [];
        let neontetra = [];
        let zebradanio = [];
        let shrimp = [];
        let pufferfish = [];
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let foodSpawned = 0;

        // Initialize scene
        function init() {
            foods = [];
            bubbles = [];
            plants = [];
            shells = [];
            jellyfish = [];
            crabs = [];
            clownfish = [];
            bettafish = [];
            angelfish = [];
            angelfish2 = [];
            bettafish2 = [];
            corydoras = [];
            discus = [];
            fancyGoldfish = [];
            goldfish = [];
            guppyfish = [];
            koifish = [];
            neontetra = [];
            zebradanio = [];
            shrimp = [];
            pufferfish = [];

            // Create jellyfish1
            for (let i = 0; i < 3; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom - aquariumBounds.top) + aquariumBounds.top;
                jellyfish.push(new Jellyfish1(x, y));
            }

            // Create jellyfish2
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom - aquariumBounds.top) + aquariumBounds.top;
                jellyfish.push(new Jellyfish2(x, y));
            }

            // Create crabs on the ground
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                crabs.push(new Crab(x, aquariumBounds.bottom - 25));
            }

            // Create clownfish
            for (let i = 0; i < 1; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.7 - aquariumBounds.top) + aquariumBounds.top;
                clownfish.push(new Clownfish(x, y));
            }

            // Create bettafish
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.65 - aquariumBounds.top) + aquariumBounds.top;
                bettafish.push(new Bettafish(x, y));
            }

            // Create angelfish - reduced for faster loading
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.6 - aquariumBounds.top) + aquariumBounds.top;
                angelfish.push(new Angelfish(x, y));
            }

            // Create angelfish2 - reduced for faster loading
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.6 - aquariumBounds.top) + aquariumBounds.top;
                angelfish2.push(new Angelfish2(x, y));
            }

            // Create bettafish2 - reduced for faster loading
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.65 - aquariumBounds.top) + aquariumBounds.top;
                bettafish2.push(new Bettafish2(x, y));
            }

            // Create corydoras
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.75 - aquariumBounds.top) + aquariumBounds.top;
                corydoras.push(new Corydoras(x, y));
            }

            // Create discus
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.65 - aquariumBounds.top) + aquariumBounds.top;
                discus.push(new Discus(x, y));
            }

            // Create fancy goldfish - reduced for faster loading
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.7 - aquariumBounds.top) + aquariumBounds.top;
                fancyGoldfish.push(new FancyGoldfish(x, y));
            }

            // Create goldfish
            for (let i = 0; i < 1; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.7 - aquariumBounds.top) + aquariumBounds.top;
                goldfish.push(new Goldfish(x, y));
            }

            // Create guppyfish
            for (let i = 0; i < 3; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.5 - aquariumBounds.top) + aquariumBounds.top;
                guppyfish.push(new Guppyfish(x, y));
            }

            // Create koifish - reduced for faster loading
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.7 - aquariumBounds.top) + aquariumBounds.top;
                koifish.push(new Koifish(x, y));
            }

            // Create neon tetra
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.5 - aquariumBounds.top) + aquariumBounds.top;
                neontetra.push(new NeonTetra(x, y));
            }

            // Create zebra danio
            for (let i = 0; i < 3; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom * 0.6 - aquariumBounds.top) + aquariumBounds.top;
                zebradanio.push(new ZebraDanio(x, y));
            }

            // Create shrimp - reduced for faster loading
            for (let i = 0; i < 10; i++) {
                shrimp.push(new Shrimp(Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left, Math.random() * (aquariumBounds.bottom - aquariumBounds.top) + aquariumBounds.top));
            }

            // Create pufferfish
            for (let i = 0; i < 2; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = Math.random() * (aquariumBounds.bottom - aquariumBounds.top) + aquariumBounds.top;
                pufferfish.push(new Pufferfish(x, y));
            }
        }

        // ============================================================================
        // INPUT HANDLING
        // ============================================================================

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        // Touch screen support - same effect as mouse movement
        document.addEventListener('touchmove', (e) => {
            // Only prevent default if touch is within canvas
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                e.preventDefault();
            }
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            // Move cursor away from canvas when touch ends
            mouseX = -1000;
            mouseY = -1000;
        });

        // Double-tap to feed fish (touch screen support)
        let lastTapTime = 0;
        let tapCount = 0;
        canvas.addEventListener('touchstart', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            
            if (tapLength < 300 && tapLength > 0) {
                // Double tap detected
                tapCount++;
                if (tapCount === 2) {
                    // Spawn food like pressing space
                    for (let i = 0; i < 5; i++) {
                        const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                        const y = aquariumBounds.top + Math.random() * (aquariumBounds.bottom - aquariumBounds.top) * 0.2;
                        foods.push(new Food(x, y));
                        foodSpawned++;
                    }
                    tapCount = 0;
                }
            } else {
                tapCount = 1;
            }
            lastTapTime = currentTime;
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                // Rain food down within aquarium bounds
                for (let i = 0; i < 5; i++) {
                    const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                    const y = aquariumBounds.top + Math.random() * (aquariumBounds.bottom - aquariumBounds.top) * 0.2;
                    foods.push(new Food(x, y));
                    foodSpawned++;
                }
            }
        });

        // Feed button handler for mobile - with continuous holding support
        const feedButton = document.getElementById('feedButton');
        let isFeedingInterval = null;
        let isPressed = false;

        function spawnFood() {
            for (let i = 0; i < 5; i++) {
                const x = Math.random() * (aquariumBounds.right - aquariumBounds.left) + aquariumBounds.left;
                const y = aquariumBounds.top + Math.random() * (aquariumBounds.bottom - aquariumBounds.top) * 0.2;
                foods.push(new Food(x, y));
                foodSpawned++;
            }
        }

        feedButton.addEventListener('mousedown', () => {
            isPressed = true;
            feedButton.classList.add('holding');
            spawnFood();
            isFeedingInterval = setInterval(spawnFood, 200);
        });

        feedButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isPressed = true;
            feedButton.classList.add('holding');
            spawnFood();
            isFeedingInterval = setInterval(spawnFood, 200);
        }, { passive: false });

        function stopFeeding() {
            if (isFeedingInterval) {
                clearInterval(isFeedingInterval);
                isFeedingInterval = null;
            }
            isPressed = false;
            feedButton.classList.remove('holding');
        }

        feedButton.addEventListener('mouseup', stopFeeding);
        feedButton.addEventListener('mouseleave', stopFeeding);
        feedButton.addEventListener('touchend', stopFeeding);
        feedButton.addEventListener('touchcancel', stopFeeding);

        // Fallback for click
        feedButton.addEventListener('click', () => {
            if (!isPressed) {
                spawnFood();
            }
        });

        // Exit button handler - close window to return to portfolio
        document.getElementById('exitButton').addEventListener('click', () => {
            const popupMsg = document.getElementById('popupMessage');
            const thankYouMsg = document.getElementById('thankYouMessage');
            popupMsg.style.display = 'none';
            thankYouMsg.style.display = 'block';
            setTimeout(() => {
                // Close the window without reloading
                if (window.opener) {
                    window.close();
                } else {
                    // Fallback: if window.close() doesn't work, use history back
                    window.history.back();
                }
            }, 2000);
        });

        // ============================================================================
        // GAME LOOP
        // ============================================================================

        function update() {
            // Update food
            for (let i = foods.length - 1; i >= 0; i--) {
                foods[i].update();
                if (foods[i].eaten || (foods[i].touchedFloor && foods[i].floorTimer <= 0)) {
                    foods.splice(i, 1);
                }
            }

            // Update bubbles
            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                if (bubbles[i].life <= 0) {
                    bubbles.splice(i, 1);
                }
            }

            // Create random bubbles from bottom
            if (Math.random() < 0.20) {
                const x = aquariumBounds.left + Math.random() * (aquariumBounds.right - aquariumBounds.left);
                bubbles.push(new Bubble(x, aquariumBounds.bottom));
            }

            // Update jellyfish
            for (let j of jellyfish) {
                j.update(mouseX, mouseY);
            }

            // Update crabs
            for (let c of crabs) {
                c.update(mouseX, mouseY);
            }

            // Update clownfish
            for (let cf of clownfish) {
                cf.update(mouseX, mouseY, foods);
            }

            // Update bettafish
            for (let bf of bettafish) {
                bf.update(mouseX, mouseY, foods);
            }

            // Update angelfish
            for (let af of angelfish) {
                af.update(mouseX, mouseY, foods);
            }

            // Update angelfish2
            for (let af2 of angelfish2) {
                af2.update(mouseX, mouseY, foods);
            }

            // Update bettafish2
            for (let bf2 of bettafish2) {
                bf2.update(mouseX, mouseY, foods);
            }

            // Update corydoras
            for (let cd of corydoras) {
                cd.update(mouseX, mouseY, foods);
            }

            // Update discus
            for (let ds of discus) {
                ds.update(mouseX, mouseY, foods);
            }

            // Update fancy goldfish
            for (let fg of fancyGoldfish) {
                fg.update(mouseX, mouseY, foods);
            }

            // Update goldfish
            for (let gf of goldfish) {
                gf.update(mouseX, mouseY, foods);
            }

            // Update guppyfish
            for (let gy of guppyfish) {
                gy.update(mouseX, mouseY, foods);
            }

            // Update koifish
            for (let kf of koifish) {
                kf.update(mouseX, mouseY, foods);
            }

            // Update neon tetra
            for (let nt of neontetra) {
                nt.update(mouseX, mouseY, foods);
            }

            // Update zebra danio
            for (let zd of zebradanio) {
                zd.update(mouseX, mouseY, foods);
            }

            // Update shrimp
            for (let sr of shrimp) {
                sr.update(mouseX, mouseY);
            }

            // Update pufferfish
            for (let pf of pufferfish) {
                pf.update(mouseX, mouseY);
            }
        }

        function draw() {
            // Draw background video
            if (backgroundLoaded) {
                ctx.drawImage(backgroundVideo, 0, 0, canvas.width, canvas.height);
            } else {
                // Fallback gradient if video not loaded
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, 'rgba(26, 77, 109, 0.6)');
                gradient.addColorStop(1, 'rgba(13, 42, 58, 0.8)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Draw food
            for (let food of foods) {
                food.draw(ctx);
            }

            // Draw bubbles
            for (let bubble of bubbles) {
                bubble.draw(ctx);
            }

            // Draw jellyfish
            for (let j of jellyfish) {
                j.draw(ctx);
            }

            // Draw crabs
            for (let c of crabs) {
                c.draw(ctx);
            }

            // Draw clownfish
            for (let cf of clownfish) {
                cf.draw(ctx);
            }

            // Draw bettafish
            for (let bf of bettafish) {
                bf.draw(ctx);
            }

            // Draw angelfish
            for (let af of angelfish) {
                af.draw(ctx);
            }

            // Draw angelfish2
            for (let af2 of angelfish2) {
                af2.draw(ctx);
            }

            // Draw bettafish2
            for (let bf2 of bettafish2) {
                bf2.draw(ctx);
            }

            // Draw corydoras
            for (let cd of corydoras) {
                cd.draw(ctx);
            }

            // Draw discus
            for (let ds of discus) {
                ds.draw(ctx);
            }

            // Draw fancy goldfish
            for (let fg of fancyGoldfish) {
                fg.draw(ctx);
            }

            // Draw goldfish
            for (let gf of goldfish) {
                gf.draw(ctx);
            }

            // Draw guppyfish
            for (let gy of guppyfish) {
                gy.draw(ctx);
            }

            // Draw koifish
            for (let kf of koifish) {
                kf.draw(ctx);
            }

            // Draw neon tetra
            for (let nt of neontetra) {
                nt.draw(ctx);
            }

            // Draw zebra danio
            for (let zd of zebradanio) {
                zd.draw(ctx);
            }

            // Draw shrimp
            for (let sr of shrimp) {
                sr.draw(ctx);
            }

            // Draw pufferfish
            for (let pf of pufferfish) {
                pf.draw(ctx);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game function with initialization tracking
        function startGame() {
            if (!gameInitialized) {
                gameInitialized = true;
                
                // Hide loading screen
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) {
                    loadingScreen.classList.add('hidden');
                }
                
                resizeCanvas();
                init();
            }
            if (!gameLoopRunning) {
                gameLoopRunning = true;
                gameLoop();
            }
        }

        // Start the game when window loads or orientation is landscape
        window.addEventListener('load', () => {
            startGame();
        });

        // Fallback if load event doesn't fire
        setTimeout(() => {
            if (!gameInitialized) {
                startGame();
            }
        }, 100);
    </script>
