<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0e14 0%, #1a1f2e 100%);
            color: #f0f0f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #e8ff47 0%, #47c8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .info-bar {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .score-box {
            background: rgba(30, 35, 45, 0.8);
            border: 2px solid rgba(232, 255, 71, 0.2);
            padding: 15px 20px;
            border-radius: 8px;
            text-align: center;
            flex: 1;
            min-width: 100px;
        }
        
        .score-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .score-value {
            color: #e8ff47;
            font-size: 1.8em;
            font-weight: bold;
        }
        
        .game-container {
            background: rgba(30, 35, 45, 0.8);
            border: 2px solid rgba(232, 255, 71, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: rgba(12, 12, 14, 0.5);
            padding: 10px;
            border-radius: 8px;
        }
        
        .tile {
            aspect-ratio: 1;
            background: rgba(232, 255, 71, 0.1);
            border: 2px solid rgba(232, 255, 71, 0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 2em;
            transition: all 0.15s ease;
            cursor: default;
        }
        
        .tile.empty {
            background: rgba(12, 12, 14, 0.5);
            color: transparent;
        }
        
        .tile[data-value="2"] {
            background: #eee4da;
            color: #776e65;
        }
        
        .tile[data-value="4"] {
            background: #ede0c8;
            color: #776e65;
        }
        
        .tile[data-value="8"] {
            background: #f2b179;
            color: #f9f6f2;
        }
        
        .tile[data-value="16"] {
            background: #f59563;
            color: #f9f6f2;
        }
        
        .tile[data-value="32"] {
            background: #f67c5f;
            color: #f9f6f2;
        }
        
        .tile[data-value="64"] {
            background: #f65e3b;
            color: #f9f6f2;
        }
        
        .tile[data-value="128"] {
            background: #edcf72;
            color: #f9f6f2;
            font-size: 1.5em;
        }
        
        .tile[data-value="256"] {
            background: #edcc61;
            color: #f9f6f2;
            font-size: 1.5em;
        }
        
        .tile[data-value="512"] {
            background: #edc850;
            color: #f9f6f2;
            font-size: 1.5em;
        }
        
        .tile[data-value="1024"] {
            background: #edc53f;
            color: #f9f6f2;
            font-size: 1.2em;
        }
        
        .tile[data-value="2048"] {
            background: #edc22e;
            color: #f9f6f2;
            font-size: 1.2em;
        }
        
        .tile.new {
            animation: pop 0.15s ease;
        }
        
        @keyframes pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #e8ff47 0%, #47c8ff 100%);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(232, 255, 71, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .game-over.show {
            display: flex;
        }
        
        .game-over-content {
            background: linear-gradient(135deg, #0a0e14 0%, #1a1f2e 100%);
            border: 2px solid #e8ff47;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        
        .game-over-content h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #e8ff47;
        }
        
        .game-over-content p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #ccc;
        }
        
        .instructions {
            background: rgba(71, 200, 255, 0.05);
            border-left: 3px solid #47c8ff;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 0.95em;
            color: #bbb;
            text-align: left;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            
            .tile {
                font-size: 1.5em;
            }
            
            .info-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
        </div>
        
        <div class="info-bar">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div class="score-value" id="best">0</div>
            </div>
        </div>
        
        <div class="game-container">
            <div class="game-board" id="gameBoard"></div>
        </div>
        
        <div class="controls">
            <button onclick="newGame()">New Game</button>
        </div>
        
        <div class="instructions">
            <strong>How to play:</strong>
            <ul style="margin-top: 10px; margin-left: 20px;">
                <li>Use arrow keys or WASD to move tiles</li>
                <li>When two tiles with the same number touch, they merge into one</li>
                <li>Reach the 2048 tile to win!</li>
                <li>Game ends when no more moves are possible</li>
            </ul>
        </div>
    </div>
    
    <div class="game-over" id="gameOverModal">
        <div class="game-over-content">
            <h2 id="gameOverTitle">Game Over!</h2>
            <p id="gameOverMessage"></p>
            <button onclick="newGame()">Play Again</button>
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.board = Array(4).fill(null).map(() => Array(4).fill(0));
                this.score = 0;
                this.best = parseInt(localStorage.getItem('2048Best')) || 0;
                this.history = [];
                this.init();
            }
            
            init() {
                this.addNewTile();
                this.addNewTile();
                this.render();
            }
            
            addNewTile() {
                const empty = this.getEmptyTiles();
                if (empty.length === 0) return;
                
                const [x, y] = empty[Math.floor(Math.random() * empty.length)];
                this.board[x][y] = Math.random() < 0.9 ? 2 : 4;
            }
            
            getEmptyTiles() {
                const empty = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.board[i][j] === 0) empty.push([i, j]);
                    }
                }
                return empty;
            }
            
            move(direction) {
                this.history.push(JSON.parse(JSON.stringify(this.board)));
                
                if (direction === 'left') this.moveLeft();
                else if (direction === 'right') this.moveRight();
                else if (direction === 'up') this.moveUp();
                else if (direction === 'down') this.moveDown();
                
                if (JSON.stringify(this.history[this.history.length - 1]) !== JSON.stringify(this.board)) {
                    this.addNewTile();
                    this.render();
                    this.checkGameOver();
                } else {
                    this.history.pop();
                }
            }
            
            moveLeft() {
                for (let i = 0; i < 4; i++) {
                    this.board[i] = this.compress(this.board[i]);
                }
            }
            
            moveRight() {
                for (let i = 0; i < 4; i++) {
                    this.board[i] = this.compress(this.board[i].reverse()).reverse();
                }
            }
            
            moveUp() {
                this.board = this.transpose(this.board);
                for (let i = 0; i < 4; i++) {
                    this.board[i] = this.compress(this.board[i]);
                }
                this.board = this.transpose(this.board);
            }
            
            moveDown() {
                this.board = this.transpose(this.board);
                for (let i = 0; i < 4; i++) {
                    this.board[i] = this.compress(this.board[i].reverse()).reverse();
                }
                this.board = this.transpose(this.board);
            }
            
            compress(line) {
                line = line.filter(v => v !== 0);
                
                for (let i = 0; i < line.length - 1; i++) {
                    if (line[i] === line[i + 1]) {
                        line[i] *= 2;
                        this.score += line[i];
                        line.splice(i + 1, 1);
                    }
                }
                
                while (line.length < 4) {
                    line.push(0);
                }
                
                return line;
            }
            
            transpose(board) {
                const transposed = Array(4).fill(null).map(() => Array(4).fill(0));
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        transposed[i][j] = board[j][i];
                    }
                }
                return transposed;
            }
            
            undo() {
                if (this.history.length > 0) {
                    this.board = this.history.pop();
                    this.render();
                }
            }
            
            checkGameOver() {
                if (this.getEmptyTiles().length > 0) return false;
                
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const current = this.board[i][j];
                        
                        if (j < 3 && current === this.board[i][j + 1]) return false;
                        if (i < 3 && current === this.board[i + 1][j]) return false;
                    }
                }
                
                this.updateBest();
                return true;
            }
            
            updateBest() {
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('2048Best', this.best);
                }
            }
            
            render() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('best').textContent = this.best;
                
                const board = document.getElementById('gameBoard');
                board.innerHTML = '';
                
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        const value = this.board[i][j];
                        
                        if (value !== 0) {
                            tile.setAttribute('data-value', value);
                            tile.textContent = value;
                            tile.classList.add('new');
                        } else {
                            tile.classList.add('empty');
                        }
                        
                        board.appendChild(tile);
                    }
                }
            }
        }
        
        let game = new Game2048();
        
        function newGame() {
            game = new Game2048();
            document.getElementById('gameOverModal').classList.remove('show');
        }
        
        function undoMove() {
            game.undo();
        }
        
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right',
                'w': 'up',
                'W': 'up',
                's': 'down',
                'S': 'down',
                'a': 'left',
                'A': 'left',
                'd': 'right',
                'D': 'right'
            };
            
            if (keyMap[e.key]) {
                e.preventDefault();
                game.move(keyMap[e.key]);
                
                if (game.checkGameOver()) {
                    setTimeout(() => {
                        document.getElementById('gameOverTitle').textContent = 'Game Over!';
                        document.getElementById('gameOverMessage').textContent = `Final Score: ${game.score}`;
                        document.getElementById('gameOverModal').classList.add('show');
                    }, 300);
                }
            }
        });

        // Enhanced touch support for mobile - fixed direction and scroll prevention
        let touchStartX = 0;
        let touchStartY = 0;
        let isTouchingBoard = false;
        const minSwipeDistance = 30;
        const gameBoard = document.querySelector('.game-board');

        gameBoard.addEventListener('touchstart', (e) => {
            isTouchingBoard = true;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        gameBoard.addEventListener('touchmove', (e) => {
            // Prevent page scroll only when touching the game board
            if (isTouchingBoard) {
                e.preventDefault();
            }
        }, { passive: false });

        gameBoard.addEventListener('touchend', (e) => {
            if (!isTouchingBoard) return;
            
            isTouchingBoard = false;
            
            if (e.changedTouches.length === 0) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            // Fixed: Calculate difference correctly (end - start, not start - end)
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const absDiffX = Math.abs(diffX);
            const absDiffY = Math.abs(diffY);

            if (Math.max(absDiffX, absDiffY) < minSwipeDistance) return;

            let direction = null;

            if (absDiffX > absDiffY) {
                // Horizontal swipe
                direction = diffX > 0 ? 'right' : 'left';
            } else {
                // Vertical swipe
                direction = diffY > 0 ? 'down' : 'up';
            }

            if (direction) {
                e.preventDefault();
                game.move(direction);

                if (game.checkGameOver()) {
                    setTimeout(() => {
                        document.getElementById('gameOverTitle').textContent = 'Game Over!';
                        document.getElementById('gameOverMessage').textContent = `Final Score: ${game.score}`;
                        document.getElementById('gameOverModal').classList.add('show');
                    }, 300);
                }
            }
        }, { passive: false });
    </script>
</body>
</html>
